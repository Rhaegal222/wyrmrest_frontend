name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

jobs:
  build:
    name: Angular 21 / Node 22
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: service/package-lock.json

      - name: Install npm dependencies
        working-directory: service
        run: npm ci


      - name: Build
        working-directory: service
        run: npm run build -- --configuration production

      - name: Check vulnerable dependencies
        working-directory: service
        run: npm audit --audit-level=critical

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/wyrmrest-frontend
          tags: |
            type=sha
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/wyrmrest-frontend:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/wyrmrest-frontend:cache,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  notify-failure:
    name: Notify Discord on CI failure
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          [[ -z "$DISCORD_WEBHOOK" ]] && exit 0
          FAILED_JOBS=$(jq -r 'to_entries | map(select(.value.result == "failure") | "- " + .key) | join("\n")' <<< "$NEEDS_JSON")
          PAYLOAD=$(jq -n \
            --arg title "CI FALLITA - wyrmrest_frontend" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg event "${{ github.event_name }}" \
            --arg failed "$FAILED_JOBS" \
            '{embeds:[{
              title: $title, url: $url, color: 15158332,
              fields: [
                {name:"Repo", value:"wyrmrest_frontend", inline:true},
                {name:"Branch", value:("`"+$branch+"`"), inline:true},
                {name:"Commit", value:("`"+($sha[0:7])+"`"), inline:true},
                {name:"Evento", value:$event, inline:true},
                {name:"Actor", value:$actor, inline:true},
                {name:"Job falliti", value:($failed // "n/d"), inline:false}
              ]
            }]}')
          curl -sf -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
