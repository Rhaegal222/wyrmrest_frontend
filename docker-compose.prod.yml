name: "wyrmrest_frontend_prod"

services:
  service:
    container_name: wyrmrest_frontend_prod
    build:
      context: ./
      dockerfile: Dockerfile.staging
    environment:
      - NODE_ENV=production
    networks:
      - wyrmrest_network
    expose:
      - 80
    ports:
      - "7022:80"

    security_opt:
      - no-new-privileges:true

    restart: unless-stopped

    cpus: 2
    mem_limit: 1G
    memswap_limit: 1G
    mem_reservation: 256M
    pids_limit: 256

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  wyrmrest_network:
    external: true
    name: wyrmrest_network
