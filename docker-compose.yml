services:
  service:
    # =============================================================================
    # 🚩 CONTAINER NAME
    # =============================================================================
    container_name: wyrmrest-frontend-production-service
    # =============================================================================
    # 📀 BUILD
    # =============================================================================
    build:
      context: ../
      dockerfile: wyrmrest_frontend/Dockerfile.staging

    # =============================================================================
    # 🌤 ENVIRONMENT
    # =============================================================================
    environment:
      - NODE_ENV=production

    # =============================================================================
    # 🔗 NETWORKS
    # =============================================================================
    networks:
      - wyrmrest_network
      - proxy
    expose:
      - 80

    labels:
      - traefik.enable=${TRAEFIK_ENABLE:-true}
      - traefik.docker.network=proxy
      - traefik.http.routers.wyrmrest-frontend.rule=(Host(`wyrmrest.it`) || Host(`www.wyrmrest.it`) || Host(`wyrmrest.com`) || Host(`www.wyrmrest.com`)) && PathPrefix(`/`)
      - traefik.http.routers.wyrmrest-frontend.entrypoints=websecure
      - traefik.http.routers.wyrmrest-frontend.tls=true
      - traefik.http.routers.wyrmrest-frontend.priority=10
      - traefik.http.routers.wyrmrest-frontend.middlewares=maintenance-error@docker
      - traefik.http.services.wyrmrest-frontend.loadbalancer.server.port=80

    # =============================================================================
    # SECURITY OPTIONS
    # =============================================================================
    security_opt:
      - no-new-privileges:true

    # =============================================================================
    # 🔄 RESTART POLICY
    # =============================================================================
    restart: unless-stopped

    # =============================================================================
    # RESOURCE LIMITS
    # =============================================================================
    cpus: 2
    mem_limit: 2G
    memswap_limit: 2G
    mem_reservation: 512M
    pids_limit: 512

    # =============================================================================
    # 🏥 HEALTHCHECK
    # =============================================================================
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # =============================================================================
    # 📝 LOGGING
    # =============================================================================
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =============================================================================
# 🔗 NETWORKS
# =============================================================================
networks:
  wyrmrest_network:
    external: true
    name: wyrmrest_network
  proxy:
    external: true
    name: proxy

volumes:
  node_modules:
