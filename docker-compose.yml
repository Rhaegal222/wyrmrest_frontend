name: "wyrmrest_frontend_develop"

services:
  service:
    # =============================================================================
    # 🚩 CONTAINER NAME
    # =============================================================================
    container_name: wyrmrest_frontend_develop

    # =============================================================================
    # 📀 BUILD
    # =============================================================================
    build:
      context: ./
      dockerfile: Dockerfile

    # =============================================================================
    # 💾 VOLUMES
    # =============================================================================
    volumes:
      - ./service:/app
      - /app/node_modules

    # =============================================================================
    # 🌤 ENVIRONMENT
    # =============================================================================
    environment:
      - NODE_ENV=development

    # =============================================================================
    # 🔗 NETWORKS
    # =============================================================================
    networks:
      - wyrmrest_network
    expose:
      - 4200
    ports:
      - "7002:4200"

    # =============================================================================
    # 🔐 SECURITY OPTIONS
    # =============================================================================
    security_opt:
      - no-new-privileges:true

    # =============================================================================
    # 🔄 RESTART POLICY
    # =============================================================================
    restart: unless-stopped

    # =============================================================================
    # 📊 RESOURCE LIMITS
    # =============================================================================
    cpus: 2
    mem_limit: 2G
    memswap_limit: 2G
    mem_reservation: 512M
    pids_limit: 512

    # =============================================================================
    # 🏥 HEALTHCHECK
    # =============================================================================
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # =============================================================================
    # 📝 LOGGING
    # =============================================================================
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =============================================================================
# 🔗 NETWORKS
# =============================================================================
networks:
  wyrmrest_network:
    external: true
    name: wyrmrest_network
