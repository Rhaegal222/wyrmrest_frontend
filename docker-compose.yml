services:
  service:
    # =============================================================================
    # 🚩 CONTAINER NAME
    # =============================================================================
    # =============================================================================
    # 📀 BUILD
    # =============================================================================
    build:
      context: ./
      dockerfile: Dockerfile

    # =============================================================================
    # 💾 VOLUMES
    # =============================================================================
    volumes:
      - ./service:/app
      - ./service/node_modules:/app/node_modules

    # =============================================================================
    # 🌤 ENVIRONMENT
    # =============================================================================
    environment:
      - NODE_ENV=development

    user: "1000:1000"

    command: >
      sh -c 'test -d node_modules/@angular/build || npm ci --include=dev;
             ng serve --host 0.0.0.0 --allowed-hosts --poll 2000'

    # =============================================================================
    # 🔗 NETWORKS
    # =============================================================================
    networks:
      - wyrmrest_network
      - proxy
    expose:
      - 4200

    labels:
      - traefik.enable=${TRAEFIK_ENABLE:-true}
      - traefik.docker.network=proxy
      - traefik.http.routers.wyrmrest-frontend.rule=(Host(`wyrmrest.it`) || Host(`www.wyrmrest.it`) || Host(`wyrmrest.com`) || Host(`www.wyrmrest.com`)) && PathPrefix(`/`)
      - traefik.http.routers.wyrmrest-frontend.entrypoints=websecure
      - traefik.http.routers.wyrmrest-frontend.tls=true
      - traefik.http.routers.wyrmrest-frontend.priority=1
      - traefik.http.services.wyrmrest-frontend.loadbalancer.server.port=4200

    # =============================================================================
    # 🔐 SECURITY OPTIONS
    # =============================================================================
    security_opt:
      - no-new-privileges:true

    # =============================================================================
    # 🔄 RESTART POLICY
    # =============================================================================
    restart: unless-stopped

    # =============================================================================
    # 📊 RESOURCE LIMITS
    # =============================================================================
    cpus: 2
    mem_limit: 2G
    memswap_limit: 2G
    mem_reservation: 512M
    pids_limit: 512

    # =============================================================================
    # 🏥 HEALTHCHECK
    # =============================================================================
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # =============================================================================
    # 📝 LOGGING
    # =============================================================================
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =============================================================================
# 🔗 NETWORKS
# =============================================================================
networks:
  wyrmrest_network:
    external: true
    name: wyrmrest_network
  proxy:
    external: true
    name: proxy
