<main>
  <section>
    <div>
      <span aria-hidden="true"></span>
      <p>Wyrmrest Hub</p>
      <h1>Accesso</h1>
      <p>Entra per aprire i tool interni secondo il tuo profilo.</p>
    </div>

    <form (ngSubmit)="submit()" [formGroup]="form">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" required />
      </label>

      <label>
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" required />
      </label>

      @if (twoFactorRequired()) {
        <label>
          <span>Codice 2FA</span>
          <input type="text" formControlName="code" inputmode="numeric" autocomplete="one-time-code" required />
        </label>
      }

      <label>
        <input type="checkbox" formControlName="remember" />
        <span>Ricordami</span>
      </label>

      @if (error(); as message) {
        <p>{{ message }}</p>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) {
          Attendi...
        } @else if (twoFactorRequired()) {
          Verifica 2FA
        } @else {
          Accedi
        }
      </button>
    </form>

    <a routerLink="/">Torna all'Hub</a>
  </section>
</main>
