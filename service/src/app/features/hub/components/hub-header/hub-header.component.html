<header class="hub-topbar">

  <!-- Brand -->
  <a class="brand-lockup" href="#overview" aria-label="Vai all'inizio dell'hub">
    <div class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 6.5v11l3.5-4 3.5 4 3.5-4 3.5 4v-11"/>
        <path d="M4.5 6.5c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 3.5 2"/>
      </svg>
    </div>
    <div class="brand-text">
      <p class="brand-eyebrow">Wyrmrest Hub</p>
      <h1 class="brand-name">WYRMREST</h1>
    </div>
  </a>

  <!-- Desktop nav -->
  <nav class="hub-nav" aria-label="Navigazione hub">
    <a
      class="hub-nav__item"
      href="#overview"
      [class.is-active]="activeSection === 'overview'"
      [attr.aria-current]="activeSection === 'overview' ? 'page' : null"
    >Overview</a>
    <a
      class="hub-nav__item"
      href="#core-modules"
      [class.is-active]="activeSection === 'core-modules'"
      [attr.aria-current]="activeSection === 'core-modules' ? 'page' : null"
    >Moduli</a>
    <a
      class="hub-nav__item"
      href="#public-tools"
      [class.is-active]="activeSection === 'public-tools'"
      [attr.aria-current]="activeSection === 'public-tools' ? 'page' : null"
    >Tool pubblici</a>
    <a
      class="hub-nav__item"
      href="#internal-tools"
      [class.is-active]="activeSection === 'internal-tools'"
      [attr.aria-current]="activeSection === 'internal-tools' ? 'page' : null"
    >Area riservata</a>
  </nav>

  <!-- Actions -->
  <div class="topbar-actions">

    <!-- Mobile section indicator -->
    <span class="section-indicator" aria-hidden="true">{{ activeSectionLabel }}</span>

    <!-- Desktop: login CTA -->
    <a
      class="wr-button wr-button--primary topbar-login-cta"
      routerLink="/login"
      aria-label="Accedi all'area riservata"
    >
      Accedi
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 8h10"/><path d="m9 4 4 4-4 4"/>
      </svg>
    </a>

    <!-- Desktop: theme toggle -->
    <button
      type="button"
      class="topbar-theme-btn"
      (click)="themeService.toggleTheme()"
      [attr.aria-label]="isDark ? 'Passa al tema chiaro' : 'Passa al tema scuro'"
      [title]="isDark ? 'Tema chiaro' : 'Tema scuro'"
    >
      @if (isDark) {
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <!-- Menu button (mobile) -->
    <button
      type="button"
      class="topbar-menu-btn"
      [class.is-open]="drawerOpen"
      (click)="menuRequested.emit()"
      aria-haspopup="dialog"
      [attr.aria-expanded]="drawerOpen"
      aria-controls="hub-drawer"
      [attr.aria-label]="drawerOpen ? 'Chiudi menu' : 'Apri menu'"
    >
      <span class="menu-btn__bar menu-btn__bar--1" aria-hidden="true"></span>
      <span class="menu-btn__bar menu-btn__bar--2" aria-hidden="true"></span>
      <span class="menu-btn__bar menu-btn__bar--3" aria-hidden="true"></span>
    </button>

  </div>
</header>
