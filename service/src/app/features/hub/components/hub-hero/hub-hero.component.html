<section class="stats-grid">
  <div class="stat-card stat-card--primary">
    <div class="stat-value">{{ publicCount }}</div>
    <div class="stat-label">Tool Pubblici</div>
    <div class="stat-trend">Disponibili a tutti</div>
  </div>

  <div class="stat-card stat-card--warning">
    <div class="stat-value">{{ internalCount }}</div>
    <div class="stat-label">Tool Interni</div>
    <div class="stat-trend">Accesso Gated</div>
  </div>

  <div class="stat-card stat-card--info">
    <div class="stat-value">Live</div>
    <div class="stat-label">Stato Sistema</div>
    <div class="stat-trend">Monitoraggio attivo</div>
  </div>
</section>
