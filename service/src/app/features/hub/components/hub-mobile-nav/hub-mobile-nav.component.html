<ui-offcanvas
  id="hub-drawer"
  [isOpen]="isOpen"
  eyebrow="Wyrmrest Hub"
  title="WYRMREST"
  ariaLabel="Menu mobile Wyrmrest"
  (closeEvent)="close()"
>
  <a nav class="wr-offcanvas__item" href="#overview" [class.is-active]="activeSection === 'overview'" [attr.aria-current]="activeSection === 'overview' ? 'page' : null" (click)="close()">Overview</a>
  <a nav class="wr-offcanvas__item" href="#core-modules" [class.is-active]="activeSection === 'core-modules'" [attr.aria-current]="activeSection === 'core-modules' ? 'page' : null" (click)="close()">Moduli</a>
  <a nav class="wr-offcanvas__item" href="#public-tools" [class.is-active]="activeSection === 'public-tools'" [attr.aria-current]="activeSection === 'public-tools' ? 'page' : null" (click)="close()">Tool pubblici</a>
  <a nav class="wr-offcanvas__item" href="#internal-tools" [class.is-active]="activeSection === 'internal-tools'" [attr.aria-current]="activeSection === 'internal-tools' ? 'page' : null" (click)="close()">Tool interni</a>

  <div footer class="sidebar-access">
    <p class="sidebar-kicker">Accesso rapido</p>
    @if (isAuthenticated && currentUser; as user) {
      <p class="sidebar-meta">{{ user.name }}</p>
      <p class="sidebar-submeta">{{ user.email }}</p>
      <button type="button" class="wr-button wr-button--secondary sidebar-action" (click)="requestLogout()">Esci</button>
    } @else {
      <a class="wr-button wr-button--primary sidebar-action" routerLink="/login" (click)="close()">Accedi</a>
    }
  </div>
</ui-offcanvas>
