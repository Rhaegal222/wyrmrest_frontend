<div class="sidebar-header">
  <div class="logo-icon">W</div>
  <div class="logo-text">WYRMREST</div>
</div>

<div class="sidebar-nav">
  <div class="nav-title">Catalogo</div>
  <a class="nav-item active" href="#overview">
    <span class="icon">📊</span>
    <span>Overview</span>
  </a>
  <a class="nav-item" href="#public-tools">
    <span class="icon">🌐</span>
    <span>Tool Pubblici</span>
  </a>
  <a class="nav-item" href="#internal-tools">
    <span class="icon">🔒</span>
    <span>Tool Interni</span>
  </a>

  <div class="nav-title">Area Utente</div>
  @if (!isAuthenticated) {
    <a class="nav-item" routerLink="/login">
      <span class="icon">🔑</span>
      <span>Accedi</span>
    </a>
  } @else {
    <a class="nav-item" (click)="logoutRequested.emit()">
      <span class="icon">🚪</span>
      <span>Esci</span>
    </a>
  }
</div>

<div class="sidebar-footer">
  @if (isAuthenticated && currentUser; as user) {
    <div class="user-profile">
      <div class="avatar"></div>
      <div class="user-info">
        <div class="name">{{ user.name }}</div>
        <div class="role">{{ user.roles[0]?.name || 'Utente' }}</div>
      </div>
    </div>
  } @else {
    <div class="user-profile">
      <div class="avatar"></div>
      <div class="user-info">
        <div class="name">Ospite</div>
        <div class="role">Accesso limitato</div>
      </div>
    </div>
  }
</div>
