<a
  class="platform-card wr-card wr-platform-card"
  [href]="platform().url"
  [class.is-live]="platform().badge === 'live'"
  [class.is-wip]="platform().badge === 'wip'"
  [class.is-tool]="platform().badge === 'tool'"
>
  <div class="card-header">
    <span class="card-kicker">{{ audienceLabel() }}</span>
    <span class="wr-badge status-badge" [class.wr-badge-live]="platform().badge === 'live'" [attr.data-status]="platform().badge">
      {{ badgeLabel() }}
    </span>
  </div>

  <div class="card-body">
    <h3 class="name">{{ platform().name }}</h3>
    <p class="description">{{ platform().description }}</p>
  </div>

  <div class="card-footer">
    <div class="meta">
      <code class="url">{{ urlLabel() }}</code>
      <div class="labels" aria-hidden="true">
        <span class="label">{{ accessLabel() }}</span>
      </div>
    </div>
    <div class="pc-cta" aria-hidden="true">
      <span>Apri</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3.5 10.5 8 6 12.5"/>
      </svg>
    </div>
  </div>
</a>
