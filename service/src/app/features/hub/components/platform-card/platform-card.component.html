<a class="card" [class.card--internal]="platform().audience === 'internal'" [href]="platform().url">
  <span class="card-top">
    <span class="card-icon" aria-hidden="true">{{ platform().icon }}</span>
    <span class="card-badge" [class.badge-live]="platform().badge === 'live'" [class.badge-tool]="platform().badge === 'tool'" [class.badge-wip]="platform().badge === 'wip'">{{ badgeLabel() }}</span>
  </span>
  <span class="card-name">{{ platform().name }}</span>
  <p class="card-desc">{{ platform().description }}</p>
  <span class="card-meta">
    <span class="card-pill">{{ audienceLabel() }}</span>
    <span class="card-pill">{{ accessLabel() }}</span>
  </span>
  <span class="card-footer">
    <span class="card-url">{{ platform().url }}</span>
    <span class="card-cta">Apri</span>
  </span>
</a>
