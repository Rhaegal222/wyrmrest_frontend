<a class="platform-card" 
   [class.is-live]="platform().badge === 'live'" 
   [class.is-tool]="platform().badge === 'tool'" 
   [class.is-wip]="platform().badge === 'wip'"
   [href]="platform().url"
>
  <div class="pc-header">
    <div class="pc-icon" aria-hidden="true">{{ platform().icon }}</div>
    <span class="wr-badge" 
          [class.wr-badge--success]="platform().badge === 'live'" 
          [class.wr-badge--info]="platform().badge === 'tool'" 
          [class.wr-badge--warning]="platform().badge === 'wip'">
      @if (platform().badge === 'live') {
        <span class="live-dot" aria-hidden="true"></span>
      }
      {{ badgeLabel() }}
    </span>
  </div>
  
  <div class="pc-body">
    <h3 class="pc-title">{{ platform().name }}</h3>
    <p class="pc-desc">{{ platform().description }}</p>
    
    <div class="pc-meta">
      <span class="wr-badge wr-badge--idle">{{ audienceLabel() }}</span>
      <span class="wr-badge wr-badge--idle">{{ accessLabel() }}</span>
    </div>
  </div>
  
  <div class="pc-footer">
    <code class="pc-url">{{ platform().url }}</code>
    <span class="pc-cta">Apri →</span>
  </div>
</a>
