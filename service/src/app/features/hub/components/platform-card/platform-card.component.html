<a class="wr-card wr-card--hoverable" [class.card--internal]="platform().audience === 'internal'" [href]="platform().url">
  <span class="card-top">
    <span class="card-icon" aria-hidden="true">{{ platform().icon }}</span>
    <span class="wr-badge" [class.wr-badge--success]="platform().badge === 'live'" [class.wr-badge--info]="platform().badge === 'tool'" [class.wr-badge--warning]="platform().badge === 'wip'">{{ badgeLabel() }}</span>
  </span>
  <span class="card-name">{{ platform().name }}</span>
  <p class="card-desc">{{ platform().description }}</p>
  <span class="card-meta">
    <span class="wr-badge wr-badge--idle">{{ audienceLabel() }}</span>
    <span class="wr-badge wr-badge--idle">{{ accessLabel() }}</span>
  </span>
  <span class="card-footer">
    <span class="card-url">{{ platform().url }}</span>
    <span class="card-cta">Apri</span>
  </span>
</a>
