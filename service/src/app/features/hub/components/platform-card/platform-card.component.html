<a class="dashboard-card" [href]="platform().url">
  <div class="card-header">
    <div class="icon-box">{{ platform().icon || '🛠️' }}</div>
    <div class="badges">
      <span class="status-badge" [attr.data-status]="platform().badge">{{ badgeLabel() }}</span>
    </div>
  </div>
  
  <div class="card-body">
    <h3 class="name">{{ platform().name }}</h3>
    <p class="description">{{ platform().description }}</p>
  </div>

  <div class="card-footer">
    <div class="labels">
      <span class="label">{{ audienceLabel() }}</span>
      <span class="label">{{ accessLabel() }}</span>
    </div>
    <div class="cta">Apri →</div>
  </div>
</a>
