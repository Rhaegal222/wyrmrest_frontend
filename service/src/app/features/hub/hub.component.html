<main class="hub-shell" aria-labelledby="hub-title">
  <div class="hub-layout">
    <app-hub-sidebar-nav
      [currentUser]="currentUser()"
      [isAuthenticated]="isAuthenticated()"
      (logoutRequested)="openLogoutModal()"
    />

    <section class="hub-content">
      <app-hub-header [drawerOpen]="isDrawerOpen()" (menuRequested)="openDrawer()" />
      <app-hub-hero [publicCount]="publicCount()" [internalCount]="internalCount()" />

      @if (authError(); as message) {
        <section class="panel banner-panel" role="alert">
          <p class="error-banner">{{ message }}</p>
        </section>
      }

      <app-hub-catalog-section
        sectionId="public-tools-title"
        title="Tool pubblici"
        eyebrow="Catalogo"
        [countLabel]="publicCount() + ' disponibili'"
        [platforms]="publicPlatforms()"
      />

      <app-hub-catalog-section
        sectionId="internal-tools-title"
        title="Tool interni"
        eyebrow="Area gated"
        countLabel="Riservati"
        [locked]="true"
        [loaded]="internalLoaded()"
        [authenticated]="isAuthenticated()"
        [platforms]="internalPlatforms()"
      />
    </section>
  </div>
</main>

<app-hub-footer [year]="year" />

<app-hub-mobile-nav
  [isOpen]="isDrawerOpen()"
  [currentUser]="currentUser()"
  [isAuthenticated]="isAuthenticated()"
  (closeRequested)="closeDrawer()"
  (logoutRequested)="openLogoutModal()"
/>

<ui-modal
  [title]="'Conferma uscita'"
  [isOpen]="isLogoutModalOpen()"
  (closeEvent)="closeLogoutModal()"
>
  <p>Vuoi uscire dall'area autenticata? I tool pubblici resteranno disponibili.</p>

  <div footer class="modal-actions">
    <button type="button" class="wr-button wr-button--secondary" (click)="closeLogoutModal()">Annulla</button>
    <button type="button" class="wr-button wr-button--primary" (click)="confirmLogout()">Esci</button>
  </div>
</ui-modal>
