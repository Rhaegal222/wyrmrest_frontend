@if (isOpen) {
  <div class="ui-modal-backdrop wr-modal-backdrop" (click)="onBackdropClick()" aria-hidden="true">
    <div
      #dialog
      class="ui-modal wr-modal"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      (click)="$event.stopPropagation()"
      (keydown)="onKeydown($event)"
      tabindex="-1"
    >
      <div class="ui-modal__header wr-modal__header">
        <h3 class="ui-modal__title wr-modal__title" [id]="titleId">{{ title }}</h3>
        <button
          type="button"
          class="ui-modal__close wr-button wr-button--secondary"
          (click)="close()"
          aria-label="Close modal"
        >
          ✕
        </button>
      </div>

      <div class="ui-modal__content wr-modal__body">
        <ng-content></ng-content>
      </div>

      <div class="ui-modal__footer wr-modal__footer">
        <ng-content select="[footer]"></ng-content>
      </div>
    </div>
  </div>
}
