<div class="wr-modal-backdrop" 
     [class.is-visible]="isOpen" 
     (click)="onBackdropClick()" 
     aria-hidden="true">
  <div
    #dialog
    class="wr-modal"
    [class.is-open]="isOpen"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="titleId"
    (click)="$event.stopPropagation()"
    (keydown)="onKeydown($event)"
    tabindex="-1"
  >
    <div class="wr-modal__header">
      <h3 class="wr-modal__title" [id]="titleId">{{ title }}</h3>
      <button
        type="button"
        class="wr-button wr-button--secondary"
        (click)="close()"
        aria-label="Close modal"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="wr-modal__body">
      <ng-content></ng-content>
    </div>

    <div class="wr-modal__footer">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</div>
